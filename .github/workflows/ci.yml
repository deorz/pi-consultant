name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    name: Lint, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck and test
        run: npm run check

      - name: Verify npm package contents
        run: npm run pack:check
